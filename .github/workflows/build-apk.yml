name: 打包APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: 构建 APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装依赖
        working-directory: technician-app
        run: npm install

      - name: 构建 uni-app APP（app-plus）
        working-directory: technician-app
        run: npx uni build -p app-plus

      - name: 设置 Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 创建 Android 项目并打包
        run: |
          APP=android-project/app
          mkdir -p $APP/src/main/java/com/weixiutong/technician
          mkdir -p $APP/src/main/res/values
          mkdir -p $APP/src/main/res/mipmap-hdpi
          mkdir -p $APP/src/main/assets/apps/__UNI__A215B8C/www

          # 复制 uni-app 构建输出
          cp -r technician-app/dist/build/app/* $APP/src/main/assets/apps/__UNI__A215B8C/www/

          # AndroidManifest.xml
          cat > $APP/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.weixiutong.technician">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
            <uses-permission android:name="android.permission.CAMERA"/>
            <uses-permission android:name="android.permission.RECORD_AUDIO"/>
            <uses-permission android:name="android.permission.CALL_PHONE"/>
            <application android:label="黄师傅维修" android:allowBackup="true"
              android:usesCleartextTraffic="true"
              android:theme="@android:style/Theme.Material.Light.NoActionBar">
              <activity android:name=".MainActivity" android:exported="true"
                android:configChanges="orientation|keyboardHidden|screenSize"
                android:screenOrientation="portrait">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          MANIFEST

          # MainActivity
          cat > $APP/src/main/java/com/weixiutong/technician/MainActivity.java << 'JAVA'
          package com.weixiutong.technician;
          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.*;
          public class MainActivity extends Activity {
            WebView wv;
            @Override @SuppressLint("SetJavaScriptEnabled")
            protected void onCreate(Bundle b) {
              super.onCreate(b);
              wv = new WebView(this);
              setContentView(wv);
              WebSettings s = wv.getSettings();
              s.setJavaScriptEnabled(true);
              s.setDomStorageEnabled(true);
              s.setAllowFileAccess(true);
              s.setDatabaseEnabled(true);
              s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
              wv.setWebChromeClient(new WebChromeClient());
              wv.setWebViewClient(new WebViewClient());
              wv.loadUrl("file:///android_asset/apps/__UNI__A215B8C/www/index.html");
            }
            @Override public void onBackPressed() {
              if (wv.canGoBack()) wv.goBack(); else super.onBackPressed();
            }
          }
          JAVA

          # values/themes.xml
          cat > $APP/src/main/res/values/themes.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowNoTitle">true</item>
              <item name="android:windowFullscreen">false</item>
            </style>
          </resources>
          XML

      - name: 创建 Gradle 构建文件
        run: |
          cat > android-project/settings.gradle << 'GRADLE'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
          }
          rootProject.name = 'RepairApp'
          include ':app'
          GRADLE

          cat > android-project/build.gradle << 'GRADLE'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.7.3' }
          }
          GRADLE

          cat > android-project/app/build.gradle << 'GRADLE'
          apply plugin: 'com.android.application'
          android {
            namespace 'com.weixiutong.technician'
            compileSdk 34
            defaultConfig {
              applicationId "com.weixiutong.technician"
              minSdk 21
              targetSdk 34
              versionCode 100
              versionName "1.0.0"
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          GRADLE

          cat > android-project/gradle.properties << 'GRADLE'
          org.gradle.jvmargs=-Xmx2g
          android.useAndroidX=true
          GRADLE

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 构建 APK
        run: |
          cd android-project
          gradle wrapper --gradle-version 8.14.3
          ./gradlew assembleDebug 2>&1 | tail -15

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 黄师傅维修-APK
          path: android-project/app/build/outputs/apk/debug/*.apk
          retention-days: 90
