name: 打包APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.1)'
        required: false
        default: '1.0.0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: 构建 APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装依赖
        working-directory: technician-app
        run: |
          npm install
          npm install @capacitor/core @capacitor/android @capacitor/cli

      - name: 配置 Capacitor
        working-directory: technician-app
        run: |
          # 如果 capacitor.config.json 已存在则跳过 init
          if [ ! -f capacitor.config.json ]; then
            npx cap init 黄师傅维修 com.weixiutong.technician --webDir dist --no-git
          fi
          # 如果 android 目录已存在则跳过 add
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: 构建 H5
        working-directory: technician-app
        run: |
          npx vite build --emptyOutDir false

      - name: 同步到 Android 项目
        working-directory: technician-app
        run: |
          npx cap copy
          npx cap sync

      - name: 设置 Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 构建 APK (Debug)
        working-directory: technician-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 黄师傅维修-APK
          path: technician-app/android/app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: 重命名 APK
        run: |
          VERSION="${{ github.event.inputs.version || '1.0.0' }}"
          DATE=$(date +%Y%m%d)
          cp technician-app/android/app/build/outputs/apk/debug/app-debug.apk \
             "黄师傅维修-v${VERSION}-${DATE}.apk" || true

      - name: 上传 APK (带版本号)
        uses: actions/upload-artifact@v4
        with:
          name: 黄师傅维修-v${{ github.event.inputs.version || '1.0.0' }}
          path: 黄师傅维修-*.apk
          retention-days: 90
