name: 打包APK

on:
  push:
    branches: [main]
    paths:
      - 'technician-app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build:
    name: 构建 APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        working-directory: technician-app
        run: |
          npm install
          npm install @capacitor/core @capacitor/android @capacitor/cli

      - name: 配置 Capacitor
        working-directory: technician-app
        run: |
          npx cap init 黄师傅维修 com.weixiutong.technician --webDir dist --no-git
          npx cap add android

      - name: 构建 H5
        working-directory: technician-app
        run: |
          # 修改默认API地址为生产地址
          npx vite build --emptyOutDir false

      - name: 同步到 Android 项目
        working-directory: technician-app
        run: |
          npx cap copy
          npx cap sync

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 构建 APK (Debug)
        working-directory: technician-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: 黄师傅维修-APK
          path: technician-app/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 重命名 APK
        run: |
          VERSION="${{ github.event.inputs.version || '1.0.0' }}"
          DATE=$(date +%Y%m%d)
          cp technician-app/android/app/build/outputs/apk/debug/app-debug.apk \
             "黄师傅维修-v${VERSION}-${DATE}.apk"

      - name: 上传 APK (带版本号)
        uses: actions/upload-artifact@v4
        with:
          name: 黄师傅维修-v${{ github.event.inputs.version || '1.0.0' }}-${{ github.run_number }}
          path: 黄师傅维修-*.apk
          retention-days: 90

  notify:
    name: 发送通知
    needs: build
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: 构建完成
        run: |
          echo "✅ APK 构建完成！"
          echo "下载地址请查看 Actions 页面的 Artifacts 区域"
