apply plugin: 'com.android.application'

android {
    namespace 'com.weixiutong.technician'
    compileSdk 34
    defaultConfig {
        applicationId "com.weixiutong.technician"
        minSdk 21
        targetSdk 34
        versionCode 100
        versionName "1.0.0"
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }
}

dependencies {
    implementation 'androidx.webkit:webkit:1.11.0'
}
